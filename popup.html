<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ChatterBoard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 340px;
      padding: 16px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 12px;
    }

    .button-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    button {
      flex: 1;
      padding: 10px;
      font-size: 14px;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .muted {
      color: #555;
      font-size: 12px;
      margin-top: 10px;
    }

    .status {
      margin-top: 12px;
      font-size: 12px;
      white-space: pre-wrap;
    }

    .now-reading {
      margin-top: 14px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fafafa;
      font-size: 12px;
    }

    .now-reading.hidden {
      display: none;
    }

    .frustration-label {
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 2px;
    }

    .frustration-score {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .divider {
      border: 0;
      border-top: 1px solid #ddd;
      margin: 12px 0;
    }

    .field-label {
      font-weight: bold;
      display: block;
      margin-top: 8px;
    }

    .field-value {
      display: block;
      margin-top: 2px;
      word-break: break-word;
    }

    .signal-group {
      margin-top: 14px;
    }

    .signal-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 6px;
    }

    .signal-label {
      font-weight: bold;
    }

    .signal-raw-value {
      color: #333;
      white-space: nowrap;
    }

    .signal-track {
      width: 100%;
      height: 10px;
      background: #e6e6e6;
      border-radius: 999px;
      overflow: hidden;
    }

    .signal-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      transition: width 0.2s ease;
    }

    .signal-fill.unavailable {
      width: 100% !important;
      background: #cfcfcf !important;
    }
  </style>
</head>
<body>
  <h1>ChatterBoard MVP</h1>

  <div class="button-row">
    <button id="playButton">Play</button>
    <button id="pauseButton" disabled>Pause</button>
    <button id="stopButton" disabled>Stop</button>
  </div>

  <div class="muted">Works on Azure DevOps board pages. Configure PAT in Options.</div>

  <div id="status" class="status">Idle.</div>

  <div id="nowReadingPanel" class="now-reading hidden">
    <div class="frustration-label">Frustration score</div>
    <div id="frustrationScore" class="frustration-score">-</div>

    <hr class="divider" />

    <span class="field-label">Title</span>
    <span id="currentTicketTitle" class="field-value">-</span>

    <div class="signal-group">
      <div class="signal-row">
        <span id="lastUpdatedLabel" class="signal-label">Last updated</span>
        <span id="lastUpdatedRawValue" class="signal-raw-value">-</span>
      </div>
      <div class="signal-track">
        <div id="lastUpdatedBar" class="signal-fill"></div>
      </div>
    </div>

    <div class="signal-group">
      <div class="signal-row">
        <span id="timeInColumnLabel" class="signal-label">Time in column</span>
        <span id="timeInColumnRawValue" class="signal-raw-value">-</span>
      </div>
      <div class="signal-track">
        <div id="timeInColumnBar" class="signal-fill"></div>
      </div>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
