<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ChatterBoard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 340px;
      padding: 16px;
      box-sizing: border-box;
      background: #f4f6f9;
    }

    h1 {
      font-size: 18px;
      margin: 0;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .header-logo {
      width: 40px;
      height: 40px;
      object-fit: contain;
    }

    .button-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    button {
      flex: 1;
      padding: 10px;
      font-size: 14px;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .muted {
      color: #555;
      font-size: 12px;
      margin-top: 10px;
    }

    .status {
      margin-top: 12px;
      font-size: 12px;
      white-space: pre-wrap;
    }

    .now-reading {
      margin-top: 14px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fafafa;
      font-size: 12px;
    }

    .now-reading.hidden {
      display: none;
    }

    .frustration-label {
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 2px;
    }

    .frustration-score {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .frustration-icon {
      flex-shrink: 0;
    }

    .frustration-number {
      font-size: 24px;
      font-weight: bold;
      color: #333;
    }

    .divider {
      border: 0;
      border-top: 1px solid #ddd;
      margin: 12px 0;
    }

    .field-label {
      font-weight: bold;
      display: block;
      margin-top: 8px;
    }

    .field-value {
      display: block;
      margin-top: 2px;
      word-break: break-word;
    }

    .signal-group {
      margin-top: 14px;
    }

    .signal-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 6px;
    }

    .signal-label {
      font-weight: bold;
    }

    .signal-raw-value {
      color: #333;
      white-space: nowrap;
    }

    .signal-track {
      width: 100%;
      height: 10px;
      background: #e6e6e6;
      border-radius: 999px;
      overflow: hidden;
    }

    .signal-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      transition: width 0.2s ease;
    }

    .signal-fill.unavailable {
      width: 100% !important;
      background: #cfcfcf !important;
    }
    .mode-bar {
      display: flex;
      gap: 6px;
      margin-top: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .mode-separator {
      color: #ccc;
      font-size: 10px;
    }

    .mode-pill {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 999px;
      font-weight: bold;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
    }

    .mode-pill.active {
      background: #e8f0fe;
      color: #1a56b0;
    }

    .mode-pill.active:hover {
      background: #d2e3fc;
    }

    .mode-pill.inactive {
      background: #eeeeee;
      color: #bbb;
    }

    .mode-pill.inactive:hover {
      background: #e0e0e0;
      color: #888;
    }

    .mode-pill.disabled {
      background: #f5f5f5;
      color: #ccc;
      cursor: not-allowed;
      opacity: 0.5;
    }

    .mode-pill.disabled:hover {
      background: #f5f5f5;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>ChatterBoard</h1>
    <img src="icons/icon48.png" class="header-logo" alt="ChatterBoard" />
  </div>

  <div class="button-row">
    <button id="startButton">Start</button>
    <button id="previousButton" disabled>Previous</button>
    <button id="nextButton" disabled>Next</button>
    <button id="clearButton" disabled>Clear</button>
  </div>

  <div class="muted">Works on Azure DevOps board pages. Configure PAT in Options.</div>

  <div id="status" class="status">Idle.</div>

  <div id="nowReadingPanel" class="now-reading hidden">
    <div class="frustration-label">Frustration score</div>
    <div class="frustration-score">
      <div id="frustrationIcon" class="frustration-icon">-</div>
      <div id="frustrationNumber" class="frustration-number">-</div>
    </div>

    <hr class="divider" />

    <span class="field-label">Title</span>
    <span id="currentTicketTitle" class="field-value">-</span>

    <div class="signal-group">
      <div class="signal-row">
        <span id="lastUpdatedLabel" class="signal-label">Last updated</span>
        <span id="lastUpdatedRawValue" class="signal-raw-value">-</span>
      </div>
      <div class="signal-track">
        <div id="lastUpdatedBar" class="signal-fill"></div>
      </div>
    </div>

    <div class="signal-group">
      <div class="signal-row">
        <span id="timeInColumnLabel" class="signal-label">Time in column</span>
        <span id="timeInColumnRawValue" class="signal-raw-value">-</span>
      </div>
      <div class="signal-track">
        <div id="timeInColumnBar" class="signal-fill"></div>
      </div>
    </div>

    <div class="signal-group">
      <div class="signal-row">
        <span id="timeInProgressLabel" class="signal-label">Time in progress</span>
        <span id="timeInProgressRawValue" class="signal-raw-value">-</span>
      </div>
      <div class="signal-track">
        <div id="timeInProgressBar" class="signal-fill"></div>
      </div>
    </div>
  </div>

  <div class="mode-bar">
    <span id="pillTemplates" class="mode-pill inactive">Templates</span>
    <span id="pillAiText" class="mode-pill inactive">AI text</span>
    <span class="mode-separator">·</span>
    <span id="pillChromeTts" class="mode-pill inactive">Chrome TTS</span>
    <span id="pillAiVoice" class="mode-pill inactive">AI voice</span>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
