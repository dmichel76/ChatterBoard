<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ChatterBoard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 340px;
      padding: 16px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 12px;
    }

    .button-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    button {
      flex: 1;
      padding: 10px;
      font-size: 14px;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .muted {
      color: #555;
      font-size: 12px;
      margin-top: 10px;
    }

    .status {
      margin-top: 12px;
      font-size: 12px;
      white-space: pre-wrap;
    }

    .now-reading {
      margin-top: 14px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fafafa;
      font-size: 12px;
    }

    .now-reading.hidden {
      display: none;
    }

    .now-reading h2 {
      font-size: 13px;
      margin: 0 0 8px;
    }

    .field-label {
      font-weight: bold;
      display: block;
      margin-top: 6px;
    }

    .field-value {
      display: block;
      margin-top: 2px;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <h1>ChatterBoard MVP</h1>

  <div class="button-row">
    <button id="playButton">Play</button>
    <button id="stopButton" disabled>Stop</button>
  </div>

  <div class="muted">Works on Azure DevOps board pages. Configure PAT in Options.</div>

  <div id="status" class="status">Idle.</div>

  <div id="nowReadingPanel" class="now-reading hidden">
    <h2>Now reading</h2>

    <span class="field-label">Ticket</span>
    <span id="currentTicketId" class="field-value">-</span>

    <span class="field-label">Title</span>
    <span id="currentTicketTitle" class="field-value">-</span>

    <span class="field-label">Reason</span>
    <span id="currentTicketReason" class="field-value">-</span>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
