<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ChatterBoard</title>
  <style>
    body { font-family: Arial, sans-serif; width: 320px; padding: 16px; }
    h1 { font-size: 18px; margin: 0 0 12px; }
    button { width: 100%; padding: 10px; font-size: 14px; cursor: pointer; }
    .muted { color: #555; font-size: 12px; margin-top: 10px; }
    .status { margin-top: 10px; font-size: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>ChatterBoard MVP</h1>
  <button id="playButton">Play top 5 tickets</button>
  <div class="muted">Works on Azure DevOps board pages. Configure PAT and API keys in Options.</div>
  <div id="status" class="status"></div>
  <script type="module" src="popup.js"></script>
</body>
</html>
